name: Test GIT_TOKEN access

on:
  workflow_dispatch:

jobs:
  test-checkout:
    runs-on: ubuntu-latest
    steps:
      - name: Check token type
        run: |
          echo "Testing GIT_TOKEN access to ibl-web-ops..."
          TOKEN="${{ secrets.GIT_TOKEN }}"
          if [ -z "$TOKEN" ]; then
            echo "GIT_TOKEN is EMPTY"
            exit 1
          fi
          echo "GIT_TOKEN is set (length: ${#TOKEN})"

      - name: Checkout ibl-web-ops with GIT_TOKEN
        uses: actions/checkout@v4
        with:
          repository: iblai/ibl-web-ops
          token: ${{ secrets.GIT_TOKEN }}
          path: .ops

      - name: Verify checkout
        run: |
          echo "Checkout succeeded!"
          ls -la .ops/
          echo "---"
          ls .ops/.github/workflows/ | head -5

      - name: Fallback - test with github.token
        if: failure()
        uses: actions/checkout@v4
        with:
          repository: iblai/ibl-web-ops
          token: ${{ github.token }}
          path: .ops-fallback

      - name: Fallback result
        if: failure()
        run: echo "github.token fallback also failed - confirms cross-repo access issue"
